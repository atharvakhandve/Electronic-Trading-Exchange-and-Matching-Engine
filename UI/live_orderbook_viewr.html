<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Live Order Book Viewer</title>
  <style>
    :root {
      --bg: #0b1020;
      --panel: #121933;
      --panel-2: #182144;
      --text: #e8ecff;
      --muted: #aab3d9;
      --green: #1f9d55;
      --green-soft: rgba(31, 157, 85, 0.18);
      --red: #d64545;
      --red-soft: rgba(214, 69, 69, 0.18);
      --border: #2a3568;
      --accent: #7aa2ff;
    }

    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
      background: linear-gradient(180deg, #0b1020 0%, #0e1430 100%);
      color: var(--text);
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      margin-bottom: 20px;
    }

    .title h1 {
      margin: 0 0 6px;
      font-size: 32px;
    }

    .title p {
      margin: 0;
      color: var(--muted);
    }

    .controls {
      display: grid;
      grid-template-columns: 1fr 120px 110px 110px;
      gap: 10px;
      width: min(100%, 620px);
    }

    input, button {
      border: 1px solid var(--border);
      background: var(--panel);
      color: var(--text);
      border-radius: 12px;
      padding: 12px 14px;
      font-size: 14px;
    }

    button {
      cursor: pointer;
      background: var(--panel-2);
      font-weight: 600;
    }

    button:hover { filter: brightness(1.08); }

    .status-bar {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
      margin-bottom: 20px;
    }

    .card {
      background: rgba(18, 25, 51, 0.9);
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.2);
    }

    .label {
      color: var(--muted);
      font-size: 13px;
      margin-bottom: 8px;
    }

    .value {
      font-size: 28px;
      font-weight: 700;
    }

    .green { color: #54d38a; }
    .red { color: #ff7b7b; }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 0.9fr;
      gap: 16px;
    }

    .panel-title {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 14px;
      font-size: 18px;
      font-weight: 700;
    }

    .table-head, .row {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      align-items: center;
    }

    .table-head {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
      padding: 0 10px 10px;
    }

    .rows {
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-height: 360px;
    }

    .row {
      position: relative;
      overflow: hidden;
      border: 1px solid var(--border);
      border-radius: 12px;
      padding: 10px;
    }

    .fill {
      position: absolute;
      top: 0;
      bottom: 0;
      opacity: 1;
    }

    .fill.bid { left: 0; background: var(--green-soft); }
    .fill.ask { right: 0; background: var(--red-soft); }

    .cell {
      position: relative;
      z-index: 1;
      font-size: 14px;
      font-weight: 600;
    }

    .cell.right { text-align: right; }

    .trade-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
      max-height: 455px;
      overflow: auto;
    }

    .trade-item {
      border: 1px solid var(--border);
      background: rgba(255,255,255,0.02);
      border-radius: 12px;
      padding: 10px 12px;
    }

    .trade-top {
      display: flex;
      justify-content: space-between;
      font-weight: 700;
      margin-bottom: 4px;
    }

    .muted { color: var(--muted); font-size: 12px; }

    .log {
      margin-top: 16px;
      max-height: 200px;
      overflow: auto;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      font-size: 12px;
      white-space: pre-wrap;
      line-height: 1.45;
    }

    .badge {
      display: inline-block;
      padding: 4px 8px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 700;
      border: 1px solid var(--border);
    }

    @media (max-width: 980px) {
      .controls { grid-template-columns: 1fr 1fr; }
      .status-bar { grid-template-columns: 1fr 1fr; }
      .grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <div class="title">
        <h1>Live Order Book Viewer</h1>
        <p>Connects to your Sprint 3 WebSocket and shows live order book, L1, and trades.</p>
      </div>
      <div class="controls">
        <input id="wsUrl" value="ws://127.0.0.1:8000/stream" />
        <input id="symbol" value="AAPL" />
        <button id="connectBtn">Connect</button>
        <button id="disconnectBtn">Disconnect</button>
      </div>
    </div>

    <div class="status-bar">
      <div class="card">
        <div class="label">Connection</div>
        <div class="value" id="connectionState">Disconnected</div>
      </div>
      <div class="card">
        <div class="label">Best Bid</div>
        <div class="value green" id="bestBid">--</div>
      </div>
      <div class="card">
        <div class="label">Best Ask</div>
        <div class="value red" id="bestAsk">--</div>
      </div>
      <div class="card">
        <div class="label">Spread</div>
        <div class="value" id="spread">--</div>
      </div>
    </div>

    <div class="grid">
      <div class="card">
        <div class="panel-title">
          <span>Bids</span>
          <span class="badge">Buy Side</span>
        </div>
        <div class="table-head"><div>Price</div><div style="text-align:right">Quantity</div></div>
        <div class="rows" id="bids"></div>
      </div>

      <div class="card">
        <div class="panel-title">
          <span>Asks</span>
          <span class="badge">Sell Side</span>
        </div>
        <div class="table-head"><div>Price</div><div style="text-align:right">Quantity</div></div>
        <div class="rows" id="asks"></div>
      </div>

      <div class="card">
        <div class="panel-title">
          <span>Trades</span>
          <span class="badge">Live Tape</span>
        </div>
        <div class="trade-list" id="trades"></div>
      </div>
    </div>

    <div class="card log" id="log"></div>
  </div>

  <script>
    const state = {
      ws: null,
      bids: [],
      asks: [],
      trades: []
    };

    const el = {
      wsUrl: document.getElementById('wsUrl'),
      symbol: document.getElementById('symbol'),
      connectBtn: document.getElementById('connectBtn'),
      disconnectBtn: document.getElementById('disconnectBtn'),
      connectionState: document.getElementById('connectionState'),
      bestBid: document.getElementById('bestBid'),
      bestAsk: document.getElementById('bestAsk'),
      spread: document.getElementById('spread'),
      bids: document.getElementById('bids'),
      asks: document.getElementById('asks'),
      trades: document.getElementById('trades'),
      log: document.getElementById('log')
    };

    function log(message) {
      const ts = new Date().toLocaleTimeString();
      el.log.textContent = `[${ts}] ${message}\n` + el.log.textContent;
    }

    function formatPrice(cents) {
      if (cents == null) return '--';
      return `$${(cents / 100).toFixed(2)}`;
    }

    function renderBook(sideEl, rows, side) {
      sideEl.innerHTML = '';
      const maxQty = rows.length ? Math.max(...rows.map(r => r[1]), 1) : 1;

      rows.forEach(([price, qty]) => {
        const row = document.createElement('div');
        row.className = 'row';

        const fill = document.createElement('div');
        fill.className = `fill ${side}`;
        fill.style.width = `${(qty / maxQty) * 100}%`;

        const left = document.createElement('div');
        left.className = 'cell';
        left.style.color = side === 'bid' ? '#54d38a' : '#ff7b7b';
        left.textContent = formatPrice(price);

        const right = document.createElement('div');
        right.className = 'cell right';
        right.textContent = qty.toLocaleString();

        row.appendChild(fill);
        row.appendChild(left);
        row.appendChild(right);
        sideEl.appendChild(row);
      });
    }

    function renderTrades() {
      el.trades.innerHTML = '';
      state.trades.slice(0, 20).forEach(t => {
        const item = document.createElement('div');
        item.className = 'trade-item';
        item.innerHTML = `
          <div class="trade-top">
            <span>${formatPrice(t.price_cents)}</span>
            <span>${t.qty}</span>
          </div>
          <div class="muted">Seq: ${t.seq} • ${t.symbol} • ${new Date(t.ts_ms || Date.now()).toLocaleTimeString()}</div>
        `;
        el.trades.appendChild(item);
      });
    }

    function renderL1() {
      const bestBid = state.bids[0] || null;
      const bestAsk = state.asks[0] || null;

      el.bestBid.textContent = bestBid ? formatPrice(bestBid[0]) : '--';
      el.bestAsk.textContent = bestAsk ? formatPrice(bestAsk[0]) : '--';

      if (bestBid && bestAsk) {
        el.spread.textContent = `$${((bestAsk[0] - bestBid[0]) / 100).toFixed(2)}`;
      } else {
        el.spread.textContent = '--';
      }
    }

    function renderAll() {
      renderBook(el.bids, state.bids, 'bid');
      renderBook(el.asks, state.asks, 'ask');
      renderTrades();
      renderL1();
    }

    async function loadInitialSnapshot() {
      const httpUrl = `http://127.0.0.1:8000/book/snapshot?depth=10`;
      try {
        const res = await fetch(httpUrl);
        const data = await res.json();
        state.bids = data.bids || [];
        state.asks = data.asks || [];
        renderAll();
        log('Loaded initial snapshot');
      } catch (err) {
        log('Could not load initial snapshot: ' + err.message);
      }
    }

    function connect() {
      if (state.ws && state.ws.readyState === WebSocket.OPEN) return;

      const url = el.wsUrl.value.trim();
      const symbol = el.symbol.value.trim() || 'AAPL';
      state.ws = new WebSocket(url);

      state.ws.onopen = async () => {
        el.connectionState.textContent = 'Connected';
        log('WebSocket connected');
        await loadInitialSnapshot();

        state.ws.send(JSON.stringify({
          action: 'subscribe',
          channels: ['l1', 'book', 'trades'],
          symbol
        }));
      };

      state.ws.onmessage = (event) => {
        const msg = JSON.parse(event.data);
        log('Event: ' + msg.type);

        if (msg.type === 'BookSnapshot') {
          state.bids = msg.bids || [];
          state.asks = msg.asks || [];
          renderAll();
        } else if (msg.type === 'BookL1') {
          if (msg.best_bid) state.bids[0] = msg.best_bid;
          if (msg.best_ask) state.asks[0] = msg.best_ask;
          renderL1();
        } else if (msg.type === 'TradeExecuted') {
          state.trades.unshift(msg);
          renderTrades();
        }
      };

      state.ws.onclose = () => {
        el.connectionState.textContent = 'Disconnected';
        log('WebSocket disconnected');
      };

      state.ws.onerror = () => {
        log('WebSocket error');
      };
    }

    function disconnect() {
      if (state.ws) {
        state.ws.close();
        state.ws = null;
      }
    }

    el.connectBtn.addEventListener('click', connect);
    el.disconnectBtn.addEventListener('click', disconnect);

    renderAll();
  </script>
</body>
</html>
